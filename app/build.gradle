plugins {
    id "com.android.application"
}

android {
    namespace "com.avtohit.app"
    compileSdk 36

    defaultConfig {
        applicationId "com.avtohit.app"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.moizhassan.ffmpeg:ffmpeg-kit-16kb:6.1.1"
}
